<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π-pugger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --ink: #1a1814;
    --ink2: #6b6860;
    --ink3: #b0ada6;
    --accent: #c84b2f;
    --accent-soft: #fdf5f3;
    --ok: #2f6b4b;
    --ok-soft: #f0f8f4;
    --border: #e2ddd6;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', Georgia, serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.25rem 4rem;
  }

  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.5rem, 6vw, 3.75rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  header h1 span { color: var(--accent); font-style: italic; }
  header p {
    font-size: 0.72rem;
    color: var(--ink2);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    width: 100%;
    max-width: 640px;
    margin-bottom: 1rem;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1rem;
    width: 100%;
    max-width: 640px;
  }
  .stat { background: var(--surface); padding: 1rem; text-align: center; }
  .stat-val { font-family: var(--serif); font-weight: 300; font-size: 1.85rem; line-height: 1; }
  .stat-lbl { font-size: 0.65rem; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  .mode-row { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .tab {
    flex: 1;
    padding: 10px 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { background: var(--bg); color: var(--ink); }
  .tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .section-label {
    font-size: 0.65rem;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }

  .range-inputs { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .range-inputs label { font-size: 0.78rem; color: var(--ink2); }

  .num-input {
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 7px 10px;
    width: 70px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    text-align: center;
  }
  .num-input:focus { border-color: var(--ink2); }

  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .preset {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset:hover { background: var(--bg); color: var(--ink); }

  .pi-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem;
    margin-bottom: 1.25rem;
    font-family: var(--mono);
    font-size: 1.15rem;
    line-height: 2.1;
    letter-spacing: 0.05em;
    word-break: break-all;
    min-height: 70px;
  }

  .digit {
    display: inline-block;
    width: 1.15em;
    text-align: center;
    position: relative;
  }
  .digit.shown { color: var(--ink); }
  .digit.out-of-range { color: var(--ink3); opacity: 0.4; }
  .digit.correct { color: var(--ok); font-weight: 500; }
  .digit.wrong { color: var(--accent); background: var(--accent-soft); border-radius: 3px; font-weight: 500; }
  .digit.pending { color: var(--ink3); border-bottom: 2px solid var(--border); }
  .digit.active { border-bottom: 2px solid var(--accent); color: var(--ink3); animation: blink 1.1s infinite; }

  @keyframes blink { 50% { border-bottom-color: transparent; } }

  .milestone-marker {
    display: inline-block;
    width: 3px;
    height: 3px;
    background: var(--ink3);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }
  .milestone-marker.passed { background: var(--ok); box-shadow: 0 0 0 2px var(--ok-soft); }
  .milestone-marker.failed { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

  .dot { color: var(--ink2); margin: 0 1px; }

  .actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--ink2);
  }
  .btn:hover { background: var(--bg); color: var(--ink); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn-primary:hover { opacity: 0.85; color: var(--bg); }
  .btn-danger { color: var(--accent); }
  .btn-danger:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .status-line {
    font-size: 0.78rem;
    color: var(--ink2);
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-line b { font-weight: 500; color: var(--ink); }

  .feedback {
    min-height: 20px;
    font-size: 0.8rem;
    margin-top: 0.75rem;
    letter-spacing: 0.02em;
  }
  .feedback.ok { color: var(--ok); }
  .feedback.bad { color: var(--accent); }

  .banner {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    display: none;
    border: 1px solid transparent;
  }
  .banner.visible { display: block; }
  .banner.ok { background: var(--ok-soft); border-color: var(--ok); color: var(--ok); }
  .banner.bad { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .reset-section { text-align: center; padding: 1rem 1.5rem; }
  .reset-section p { font-size: 0.72rem; color: var(--ink3); margin-bottom: 0.75rem; letter-spacing: 0.05em; }
  #confirm-reset { display: none; margin-top: 10px; gap: 8px; justify-content: center; flex-wrap: wrap; }
  #confirm-reset.visible { display: flex; }

  footer {
    margin-top: 2rem;
    font-size: 0.68rem;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-align: center;
    max-width: 620px;
  }

  .hidden-input {
    position: absolute;
    opacity: 0;
    width: 1px;
    height: 1px;
    pointer-events: none;
  }
  .typing-area { position: relative; cursor: text; }
  .small-hint { font-size: 0.7rem; color: var(--ink3); margin-top: 6px; letter-spacing: 0.04em; }

  .lang-toggle {
    position: fixed;
    top: 12px;
    right: 14px;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink2);
    cursor: pointer;
    z-index: 10;
  }
  .lang-toggle:hover { background: var(--bg); color: var(--ink); }

  /* ─── Achievements ──────────────────────────────────────── */
  .ach-card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.25rem;
    gap: 12px;
    flex-wrap: wrap;
  }
  .ach-card-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 1.4rem;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .ach-card-sub {
    font-size: 0.65rem;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .ach-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px 8px;
  }
  @media (max-width: 520px) {
    .ach-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .ach {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 10px 4px 8px;
    border-radius: 10px;
    position: relative;
    transition: background 0.2s, transform 0.15s;
    color: var(--ink3);
    cursor: default;
  }
  /* Tier color tokens — these drive the badge ring/text via currentColor. */
  .ach.tier-0 { color: var(--accent);  --tier-soft: var(--accent-soft); }   /* Vanlig — terracotta */
  .ach.tier-1 { color: #9c5a2a;        --tier-soft: #f4ebe1; }               /* Bronze */
  .ach.tier-2 { color: #6b8088;        --tier-soft: #eef1f2; }               /* Silver */
  .ach.tier-3 { color: #b8861a;        --tier-soft: #f7f0d9; }               /* Gold */
  .ach.tier-4 { color: #4a6b8a;        --tier-soft: #e8eef5; }               /* Platinum */
  .ach.unlocked:hover {
    background: var(--tier-soft);
    transform: translateY(-1px);
  }
  .ach.just-unlocked { animation: pop 0.6s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .ach-svg { width: 58px; height: 58px; }
  .ach-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.82rem;
    margin-top: 6px;
    line-height: 1.15;
    color: var(--ink);
    min-height: 1.15em;
  }
  .ach.locked .ach-name { color: var(--ink3); font-style: normal; }
  .ach-tier {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
    line-height: 1;
    color: currentColor;
    font-weight: 500;
  }
  .ach.tier-0 .ach-tier { opacity: 0.6; }
  .ach-meta {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--ink3);
    letter-spacing: 0.08em;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .ach-meta .count { color: currentColor; opacity: 0.85; }

  .ach-toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--ink);
    padding: 14px 22px;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.10);
    font-family: var(--mono);
    z-index: 100;
    text-align: center;
    max-width: 340px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
  }
  .ach-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .ach-toast.tier-0 { border-color: var(--accent); }
  .ach-toast.tier-1 { border-color: #9c5a2a; }
  .ach-toast.tier-2 { border-color: #6b8088; }
  .ach-toast.tier-3 { border-color: #b8861a; }
  .ach-toast.tier-4 { border-color: #4a6b8a; }
  .ach-toast-eyebrow {
    font-size: 0.6rem;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .ach-toast.tier-0 .ach-toast-eyebrow { color: var(--accent); }
  .ach-toast.tier-1 .ach-toast-eyebrow { color: #9c5a2a; }
  .ach-toast.tier-2 .ach-toast-eyebrow { color: #6b8088; }
  .ach-toast.tier-3 .ach-toast-eyebrow { color: #b8861a; }
  .ach-toast.tier-4 .ach-toast-eyebrow { color: #4a6b8a; }
  .ach-toast-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.3rem;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .ach-toast-sub {
    font-size: 0.72rem;
    color: var(--ink2);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">EN</button>

<header>
  <h1><span>π</span><span id="h-title">-pugger</span></h1>
  <p id="h-subtitle"></p>
</header>

<div class="stats-row">
  <div class="stat"><div class="stat-val" id="stat-max">0</div><div class="stat-lbl" id="lbl-max"></div></div>
  <div class="stat"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">Streak</div></div>
  <div class="stat"><div class="stat-val" id="stat-today">0</div><div class="stat-lbl" id="lbl-today"></div></div>
</div>

<div class="card">
  <div class="mode-row">
    <button class="tab active" data-mode="learn" onclick="setMode('learn')" id="tab-learn"></button>
    <button class="tab" data-mode="practice" onclick="setMode('practice')" id="tab-practice"></button>
  </div>

  <div class="section-label" id="lbl-range"></div>
  <div class="range-inputs">
    <label id="lbl-from"></label>
    <input type="number" id="range-from" class="num-input" min="1" max="500" value="1" onchange="onRangeChange()" onfocus="practiceActive=false">
    <label id="lbl-to"></label>
    <input type="number" id="range-to" class="num-input" min="1" max="500" value="10" onchange="onRangeChange()" onfocus="practiceActive=false">
  </div>
  <div class="preset-row">
    <button class="preset" onclick="applyPreset(1,10)">1–10</button>
    <button class="preset" onclick="applyPreset(1,20)">1–20</button>
    <button class="preset" onclick="applyPreset(1,50)">1–50</button>
    <button class="preset" onclick="applyPreset(1,100)">1–100</button>
    <button class="preset" onclick="nextTen()" id="btn-next10"></button>
    <button class="preset" onclick="allKnown()" id="btn-allknown"></button>
  </div>

  <div class="status-line" id="status-line"></div>
  <div class="banner" id="banner"></div>

  <div class="typing-area" id="typing-area" onclick="focusInput()">
    <div class="pi-wrap" id="pi-display"></div>
    <input type="text" id="hidden-input" class="hidden-input" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="off" inputmode="numeric">
  </div>

  <div class="actions-row">
    <button class="btn btn-primary" id="main-action" onclick="mainAction()"></button>
    <button class="btn" onclick="toggleReveal()" id="reveal-btn" style="display:none;"></button>
    <button class="btn" onclick="resetAttempt()" id="btn-restart"></button>
    <button class="btn" onclick="deleteLast()" id="backspace-btn" style="display:none;"></button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="small-hint" id="small-hint"></div>
</div>

<div class="card">
  <div class="ach-card-header">
    <div class="ach-card-title" id="ach-title"></div>
    <div class="ach-card-sub" id="ach-sub"></div>
  </div>
  <div class="ach-grid" id="ach-grid"></div>
</div>

<div class="ach-toast" id="ach-toast" role="status" aria-live="polite">
  <div class="ach-toast-eyebrow" id="ach-toast-eyebrow"></div>
  <div class="ach-toast-title" id="ach-toast-title"></div>
  <div class="ach-toast-sub" id="ach-toast-sub"></div>
</div>

<div class="card reset-section">
  <p id="lbl-storage"></p>
  <button class="btn btn-danger" onclick="promptReset()" id="btn-reset"></button>
  <div id="confirm-reset">
    <span style="font-size:0.78rem; color:var(--ink2); align-self:center;" id="lbl-sure"></span>
    <button class="btn btn-danger" onclick="doReset()" id="btn-yes-reset"></button>
    <button class="btn" onclick="cancelReset()" id="btn-cancel"></button>
  </div>
</div>

<footer id="footer-text"></footer>

<script>
// ─── i18n ───────────────────────────────────────────────────
const strings = {
  no: {
    title: "-pugger",
    subtitle: "Velg rekke · lær · test",
    statMax: "Lengst pugget",
    statToday: "I dag",
    tabLearn: "Lær",
    tabPractice: "Øv",
    rangeLabel: "Velg sifferrekke",
    from: "Fra siffer",
    to: "til",
    next10: "Neste 10 nye",
    allKnown: "Alle jeg kan",
    goToPractice: "Gå til øving",
    focusInput: "Fokuser input",
    showAnswer: "Vis fasit",
    hideAnswer: "Skjul fasit",
    restart: "Start på nytt",
    backspace: "⌫ Slett siste",
    hintLearn: "Les og pugg sifrene i valgt rekke. Klikk «Gå til øving» når du er klar.",
    hintPractice: "Klikk i boksen og begynn å skrive. Hvert siffer valideres umiddelbart. ⌫ for å rette.",
    storage: "Fremgang lagres lokalt i nettleseren",
    resetAll: "Nullstill all fremgang",
    sure: "Sikker?",
    yesReset: "Ja, nullstill",
    cancel: "Avbryt",
    footer: "π = 3,14159265358979323846… — opptil 500 siffer",
    statusLearn: (f, t, n) => `<span>Rekke: <b>siffer ${f}–${t}</b> (${n} siffer)</span><span>Modus: <b>Lær</b></span>`,
    statusPractice: (f, t, c, n, w) => `<span>Rekke: <b>siffer ${f}–${t}</b></span><span><b>${c}</b>/${n} riktige · ${w} skrevet</span>`,
    digitWrong: (pos, got, exp) => `✗ Siffer ${pos}: du skrev ${got}, riktig er ${exp}. Trykk ⌫ for å rette.`,
    digitOk: (pos) => `✓ Siffer ${pos} riktig`,
    milestoneOk: (pos) => `🎯 10-grense passert på siffer ${pos} — alt riktig så langt!`,
    milestoneBad: (pos) => `10-grense på siffer ${pos}, men du har minst én feil bak deg.`,
    allCorrect: (f, t, s) => `✓✓ Hele rekken ${f}–${t} riktig! Streak: ${s}`,
    allCorrectBanner: (n) => `🏆 Perfekt! ${n} siffer riktig.`,
    doneWithErrors: "Ferdig med feil. Bruk ⌫ for å rette eller «Start på nytt».",
    langToggle: "EN",
    digit: "siffer",
    achTitle: "Bragder",

    achToastUnlock: "Bragd opplåst",
    achToastUpgrade: (tier) => `Oppgradert til ${tier}`,
    achLockedName: "Låst",
    achDigitsShort: "sif",

    tierUpgradeSub: (count) => `Du har truffet dette sifferet ${count} ganger`,
  },
  en: {
    title: "-trainer",
    subtitle: "Pick range · learn · test",
    statMax: "Best memorized",
    statToday: "Today",
    tabLearn: "Learn",
    tabPractice: "Practice",
    rangeLabel: "Choose digit range",
    from: "From digit",
    to: "to",
    next10: "Next 10 new",
    allKnown: "All I know",
    goToPractice: "Start practicing",
    focusInput: "Focus input",
    showAnswer: "Show answer",
    hideAnswer: "Hide answer",
    restart: "Start over",
    backspace: "⌫ Delete last",
    hintLearn: "Read and memorize the digits in the selected range. Click \"Start practicing\" when ready.",
    hintPractice: "Click the box and start typing. Each digit is validated instantly. ⌫ to correct.",
    storage: "Progress is stored locally in your browser",
    resetAll: "Reset all progress",
    sure: "Are you sure?",
    yesReset: "Yes, reset",
    cancel: "Cancel",
    footer: "π = 3.14159265358979323846… — up to 500 digits",
    statusLearn: (f, t, n) => `<span>Range: <b>digits ${f}–${t}</b> (${n} digits)</span><span>Mode: <b>Learn</b></span>`,
    statusPractice: (f, t, c, n, w) => `<span>Range: <b>digits ${f}–${t}</b></span><span><b>${c}</b>/${n} correct · ${w} typed</span>`,
    digitWrong: (pos, got, exp) => `✗ Digit ${pos}: you typed ${got}, correct is ${exp}. Press ⌫ to fix.`,
    digitOk: (pos) => `✓ Digit ${pos} correct`,
    milestoneOk: (pos) => `🎯 10-digit mark at digit ${pos} — all correct so far!`,
    milestoneBad: (pos) => `10-digit mark at digit ${pos}, but you have at least one error behind you.`,
    allCorrect: (f, t, s) => `✓✓ Full range ${f}–${t} correct! Streak: ${s}`,
    allCorrectBanner: (n) => `🏆 Perfect! ${n} digits correct.`,
    doneWithErrors: "Done with errors. Use ⌫ to fix or \"Start over\".",
    langToggle: "NO",
    digit: "digit",
    achTitle: "Achievements",
    achSub: "Unlock by memorizing more digits",
    achToastUnlock: "Achievement unlocked",
    achToastUpgrade: (tier) => `Upgraded to ${tier}`,
    achLockedName: "Locked",
    achDigitsShort: "dig",
    tierNames: ["Standard", "Bronze", "Silver", "Gold", "Platinum"],
    tierUpgradeSub: (count) => `You've hit this digit ${count} times`,
  }
};

const isNorwegian = /^(no|nb|nn)/i.test(navigator.language);
let lang = isNorwegian ? "no" : "en";

function t(key) { return strings[lang][key]; }

function toggleLang() {
  lang = lang === "no" ? "en" : "no";
  applyLang();
  render();
}

// ─── Pi data ────────────────────────────────────────────────
// Position 1 = first decimal digit after "3,". The leading "3," is shown as a fixed prefix.
const PI_DIGITS = "1415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491";

// ─── Achievements ───────────────────────────────────────────
// Curated milestones — fits within the 500-digit cap.
const ACHIEVEMENTS = [
  { threshold: 3,   emblem: "π",   no: { name: "Første smak",      sub: "3,14 — alles startpunkt" },
                                    en: { name: "First Slice",      sub: "3.14 — everyone starts here" } },
  { threshold: 10,  emblem: "10",  no: { name: "Tideren",           sub: "Første milepæl er passert" },
                                    en: { name: "Decimator",        sub: "First milestone cleared" } },
  { threshold: 15,  emblem: "🚀", no: { name: "NASA-godkjent",     sub: "Nok presisjon til interplanetær navigasjon" },
                                    en: { name: "NASA Approved",    sub: "Enough precision for interplanetary navigation" } },
  { threshold: 31,  emblem: "3.14", no: { name: "Pi-dagen",         sub: "3/14 — Pi-dagen selv" },
                                    en: { name: "Pi Day",           sub: "3/14 — Pi Day itself" } },
  { threshold: 37,  emblem: "∞",   no: { name: "Universkalibrert", sub: "Universets omkrets, ned til ett hydrogenatom" },
                                    en: { name: "Cosmic Ruler",     sub: "Universe-scale precision, down to a hydrogen atom" } },
  { threshold: 42,  emblem: "42",  no: { name: "Svaret",            sub: "Livet, universet og alt" },
                                    en: { name: "The Answer",       sub: "Life, the universe, and everything" } },
  { threshold: 43,  emblem: "69",  no: { name: "Nice.",             sub: "Du har akkurat passert din første «69» (siffer 42–43)" },
                                    en: { name: "Nice.",            sub: "You just passed your first \"69\" (digits 42–43)" } },
  { threshold: 50,  emblem: "50",  no: { name: "Halvt hundre",     sub: "Klassisk halvveis-milepæl" },
                                    en: { name: "Half Century",     sub: "Classic halfway milestone" } },
  { threshold: 100, emblem: "100", no: { name: "Hundreåringen",    sub: "Ekte forpliktelse" },
                                    en: { name: "Centurion",        sub: "True commitment" } },
  { threshold: 314, emblem: "π²",  no: { name: "Pi-energi",         sub: "Tematisk strøkent — som å pugge til siffer 3,14" },
                                    en: { name: "Pi Power",         sub: "Thematically chef's-kiss — memorizing up to 3.14×100" } },
  { threshold: 420, emblem: "420", no: { name: "Blaze It",          sub: "En forbannet bragd" },
                                    en: { name: "Blaze It",         sub: "A cursed achievement" } },
  { threshold: 500, emblem: "★",   no: { name: "Topp av siden",    sub: "Du har slått appen — alle 500 siffer" },
                                    en: { name: "Max Mode",         sub: "You broke the app — all 500 digits" } },
];

// Tier thresholds for repeat-earnings: 1 = Standard, 10 = Bronze, 100 = Silver, 1000 = Gold, 10000 = Platinum.
const TIER_THRESHOLDS = [1, 10, 100, 1000, 10000];
function getTier(count) {
  if (count <= 0) return -1; // locked
  let tier = -1;
  for (let i = 0; i < TIER_THRESHOLDS.length; i++) {
    if (count >= TIER_THRESHOLDS[i]) tier = i;
  }
  return tier;
}
function formatCount(count) {
  if (count >= 1000) return count.toLocaleString(lang === "no" ? "nb-NO" : "en-US");
  return String(count);
}

// ─── State ──────────────────────────────────────────────────
function getState() {
  try {
    const raw = localStorage.getItem("pipugger_v4");
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { maxKnown: 0, streak: 0, best: 0, todayDate: "", todayCount: 0, achCounts: {} };
}
function saveState() {
  try { localStorage.setItem("pipugger_v4", JSON.stringify(state)); } catch(e) {}
}

let state = getState();
if (!state.achCounts || typeof state.achCounts !== "object") state.achCounts = {};
let mode = "learn";
let rangeFrom = 1;
let rangeTo = 10;
let typed = "";
let practiceActive = false;
let confirming = false;
let revealedInPractice = false;
let celebratedMilestones = new Set();
let justUnlocked = new Set();
// Per typing-session: thresholds already counted, so backspace+retype can't farm.
let thresholdsHitThisSession = new Set();

const today = new Date().toISOString().slice(0,10);
if (state.todayDate !== today) { state.todayDate = today; state.todayCount = 0; saveState(); }

if (state.maxKnown >= 10) {
  rangeFrom = state.maxKnown + 1;
  rangeTo = Math.min(state.maxKnown + 10, PI_DIGITS.length);
  document.getElementById("range-from").value = rangeFrom;
  document.getElementById("range-to").value = rangeTo;
}

// ─── Mode ───────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.mode === m));
  typed = "";
  practiceActive = false;
  revealedInPractice = false;
  celebratedMilestones.clear();
  thresholdsHitThisSession.clear();
  hideBanner();
  document.getElementById("feedback").textContent = "";

  const revealBtn = document.getElementById("reveal-btn");
  const backspaceBtn = document.getElementById("backspace-btn");

  if (m === "learn") {
    revealBtn.style.display = "none";
    backspaceBtn.style.display = "none";
  } else {
    revealBtn.style.display = "inline-block";
    backspaceBtn.style.display = "inline-block";
    setTimeout(focusInput, 50);
  }
  applyLang();
  render();
}

function onRangeChange() {
  let from = parseInt(document.getElementById("range-from").value) || 1;
  let to = parseInt(document.getElementById("range-to").value) || from;
  from = Math.max(1, Math.min(from, PI_DIGITS.length));
  to = Math.max(from, Math.min(to, PI_DIGITS.length));
  document.getElementById("range-from").value = from;
  document.getElementById("range-to").value = to;
  rangeFrom = from;
  rangeTo = to;
  typed = "";
  practiceActive = false;
  revealedInPractice = false;
  celebratedMilestones.clear();
  thresholdsHitThisSession.clear();
  hideBanner();
  document.getElementById("feedback").textContent = "";
  render();
}

function applyPreset(a, b) {
  document.getElementById("range-from").value = a;
  document.getElementById("range-to").value = b;
  onRangeChange();
}
function nextTen() {
  const start = state.maxKnown + 1;
  applyPreset(start, Math.min(start + 9, PI_DIGITS.length));
}
function allKnown() {
  if (state.maxKnown < 1) { applyPreset(1, 10); return; }
  applyPreset(1, state.maxKnown);
}

function focusInput() {
  if (mode === "practice") {
    practiceActive = true;
    document.getElementById("hidden-input").focus();
    render();
  }
}

function mainAction() {
  if (mode === "learn") setMode("practice");
  else focusInput();
}

function resetAttempt() {
  typed = "";
  revealedInPractice = false;
  celebratedMilestones.clear();
  thresholdsHitThisSession.clear();
  hideBanner();
  document.getElementById("feedback").textContent = "";
  render();
  if (mode === "practice") focusInput();
}

function toggleReveal() {
  revealedInPractice = !revealedInPractice;
  document.getElementById("reveal-btn").textContent = revealedInPractice ? t("hideAnswer") : t("showAnswer");
  render();
}

function deleteLast() {
  if (mode !== "practice") return;
  if (typed.length === 0) return;
  typed = typed.slice(0, -1);
  document.getElementById("feedback").textContent = "";
  render();
}

function promptReset() {
  confirming = !confirming;
  document.getElementById("confirm-reset").classList.toggle("visible", confirming);
}
function cancelReset() {
  confirming = false;
  document.getElementById("confirm-reset").classList.remove("visible");
}
function doReset() {
  state = { maxKnown: 0, streak: 0, best: 0, todayDate: today, todayCount: 0, achCounts: {} };
  saveState();
  confirming = false;
  document.getElementById("confirm-reset").classList.remove("visible");
  applyPreset(1, 10);
  setMode("learn");
  renderAchievements();
}

// ─── Render ─────────────────────────────────────────────────
function render() {
  const el = document.getElementById("pi-display");
  let html = "";
  const showTo = Math.min(PI_DIGITS.length, rangeTo + 4);

  if (rangeFrom === 1) {
    html += `<span class="shown" style="color:var(--ink); font-weight:500;">3</span><span class="dot">,</span>`;
  }

  for (let pos = rangeFrom; pos <= showTo; pos++) {
    const digit = PI_DIGITS[pos - 1];
    const inRange = pos >= rangeFrom && pos <= rangeTo;
    const typedIndex = pos - rangeFrom;
    let cls = "digit";
    let content = digit;

    if (!inRange) {
      cls += " out-of-range";
    } else if (mode === "learn" || revealedInPractice) {
      cls += " shown";
    } else {
      if (typedIndex < typed.length) {
        if (typed[typedIndex] === digit) { cls += " correct"; content = typed[typedIndex]; }
        else { cls += " wrong"; content = typed[typedIndex]; }
      } else if (typedIndex === typed.length && practiceActive) {
        cls += " active"; content = "·";
      } else {
        cls += " pending"; content = "·";
      }
    }

    html += `<span class="${cls}">${content}</span>`;

    if (pos % 10 === 0 && pos < showTo && pos >= rangeFrom && pos <= rangeTo) {
      let markerCls = "milestone-marker";
      if (mode === "practice" && !revealedInPractice) {
        const uptoTyped = pos - rangeFrom + 1;
        if (typed.length >= uptoTyped) {
          let allOk = true;
          for (let i = 0; i < uptoTyped; i++) {
            if (typed[i] !== PI_DIGITS[rangeFrom - 1 + i]) { allOk = false; break; }
          }
          markerCls += allOk ? " passed" : " failed";
        }
      }
      html += `<span class="${markerCls}"></span>`;
    }
  }

  el.innerHTML = html;
  updateStatus();
  updateStats();
}

function updateStatus() {
  const status = document.getElementById("status-line");
  const rangeLen = rangeTo - rangeFrom + 1;
  if (mode === "learn") {
    status.innerHTML = t("statusLearn")(rangeFrom, rangeTo, rangeLen);
  } else {
    const c = countCorrectPrefix();
    status.innerHTML = t("statusPractice")(rangeFrom, rangeTo, c, rangeLen, typed.length);
  }
}
function updateStats() {
  document.getElementById("stat-max").textContent = state.maxKnown;
  document.getElementById("stat-streak").textContent = state.streak;
  document.getElementById("stat-today").textContent = state.todayCount;
}

function countCorrectPrefix() {
  let c = 0;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] === PI_DIGITS[rangeFrom - 1 + i]) c++;
    else break;
  }
  return c;
}

function showBanner(msg, ok) {
  const b = document.getElementById("banner");
  b.textContent = msg;
  b.className = "banner visible " + (ok ? "ok" : "bad");
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(hideBanner, 3500);
}
function hideBanner() {
  document.getElementById("banner").classList.remove("visible");
}

// ─── Achievements rendering ─────────────────────────────────
function renderAchievements() {
  const grid = document.getElementById("ach-grid");
  if (!grid) return;
  let html = "";
  for (const a of ACHIEVEMENTS) {
    const count = state.achCounts[a.threshold] || 0;
    const tier = getTier(count); // -1 locked, 0..4 standard..platinum
    const unlocked = tier >= 0;
    const fresh = unlocked && justUnlocked.has(a.threshold);
    const info = lang === "no" ? a.no : a.en;
    const tierName = tier >= 0 ? strings[lang].tierNames[tier] : "";
    const cls = "ach " + (unlocked ? `unlocked tier-${tier}` : "locked") + (fresh ? " just-unlocked" : "");
    const tooltip = unlocked
      ? `${info.name} (${tierName}) — ${info.sub}`
      : `${a.threshold} ${strings[lang].digit}: ${strings[lang].achLockedName}`;

    // Adjust font-size for longer emblems
    const emblem = unlocked ? a.emblem : "?";
    const len = [...emblem].length; // codepoint length, handles emoji
    let fs = 20;
    if (len === 2) fs = 18;
    else if (len === 3) fs = 15;
    else if (len >= 4) fs = 12;
    const isEmoji = /\p{Extended_Pictographic}/u.test(emblem);
    if (isEmoji) fs = 22;

    // Tier decoration: thicker outer ring + small tier-pip dots at the top for higher tiers.
    const ringWidth = unlocked ? (1.5 + Math.min(tier, 2) * 0.4) : 1.5;
    const pips = unlocked && tier >= 1
      ? Array.from({ length: Math.min(tier, 4) }, (_, i) => {
          // Place 1..4 pips arrayed across the top of the badge
          const total = Math.min(tier, 4);
          const spread = 8; // pixels between pips
          const startX = 32 - (total - 1) * spread / 2;
          const x = startX + i * spread;
          return `<circle cx="${x}" cy="11" r="1.6" fill="currentColor"/>`;
        }).join("")
      : "";

    html += `
      <div class="${cls}" title="${escapeAttr(tooltip)}">
        <svg class="ach-svg" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="29" fill="none" stroke="currentColor" stroke-width="${ringWidth}"${unlocked ? "" : ' stroke-dasharray="2 3" opacity="0.6"'}/>
          <circle cx="32" cy="32" r="24" fill="none" stroke="currentColor" stroke-width="0.5" opacity="${unlocked ? 0.5 : 0.3}"/>
          <line x1="32" y1="3" x2="32" y2="7" stroke="currentColor" stroke-width="1.2" opacity="${unlocked ? 1 : 0.5}"/>
          <line x1="32" y1="57" x2="32" y2="61" stroke="currentColor" stroke-width="1.2" opacity="${unlocked ? 1 : 0.5}"/>
          <line x1="3" y1="32" x2="7" y2="32" stroke="currentColor" stroke-width="1.2" opacity="${unlocked ? 1 : 0.5}"/>
          <line x1="57" y1="32" x2="61" y2="32" stroke="currentColor" stroke-width="1.2" opacity="${unlocked ? 1 : 0.5}"/>
          ${pips}
          <text x="32" y="${32 + fs/3}" font-family="Fraunces, Georgia, serif" font-size="${fs}" font-weight="300" fill="currentColor" text-anchor="middle">${escapeText(emblem)}</text>
        </svg>
        <div class="ach-name">${unlocked ? escapeText(info.name) : "—"}</div>
        ${unlocked ? `<div class="ach-tier">${escapeText(tierName)}</div>` : ""}
        <div class="ach-meta">${a.threshold} ${strings[lang].achDigitsShort}${unlocked ? ` · <span class="count">${formatCount(count)}×</span>` : ""}</div>
      </div>
    `;
  }
  grid.innerHTML = html;
}

function escapeText(s) {
  return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function escapeAttr(s) {
  return String(s).replace(/["&<>]/g, c => ({ '"': "&quot;", "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

// Called after each correctly-typed digit during practice.
// Awards the achievement when its threshold position is reached with a clean prefix.
// Returns true if a count was incremented (so we can save).
function awardIfThreshold(currentPos) {
  const ach = ACHIEVEMENTS.find(a => a.threshold === currentPos);
  if (!ach) return false;
  if (thresholdsHitThisSession.has(currentPos)) return false; // anti-farm: each threshold counts once per session
  thresholdsHitThisSession.add(currentPos);

  const prevCount = state.achCounts[currentPos] || 0;
  const newCount = prevCount + 1;
  state.achCounts[currentPos] = newCount;

  const prevTier = getTier(prevCount);
  const newTier = getTier(newCount);

  justUnlocked.add(currentPos);
  // Clear the pop-flag after the animation so it doesn't re-trigger on every render.
  setTimeout(() => { justUnlocked.delete(currentPos); renderAchievements(); }, 700);

  // Toast only on tier transitions (first unlock or upgrade) — avoids spam mid-grind.
  if (newTier > prevTier) {
    showAchToast(ach, newCount, newTier, prevTier);
  }
  return true;
}

function showAchToast(ach, count, newTier, prevTier) {
  const info = lang === "no" ? ach.no : ach.en;
  const toast = document.getElementById("ach-toast");
  const tierName = strings[lang].tierNames[newTier];

  // Eyebrow text: "Achievement unlocked" on first time, "Upgraded to <tier>" after.
  const eyebrow = (prevTier < 0)
    ? strings[lang].achToastUnlock
    : strings[lang].achToastUpgrade(tierName);

  // Sub: on first unlock show the lore line, on upgrades show the count milestone.
  const sub = (prevTier < 0)
    ? info.sub
    : strings[lang].tierUpgradeSub(count);

  document.getElementById("ach-toast-eyebrow").textContent = eyebrow;
  document.getElementById("ach-toast-title").textContent = info.name;
  document.getElementById("ach-toast-sub").textContent = sub;

  // Tier-coloured border and eyebrow.
  toast.classList.remove("visible", "tier-0", "tier-1", "tier-2", "tier-3", "tier-4");
  toast.classList.add("tier-" + newTier);
  void toast.offsetWidth; // force reflow to restart transition
  toast.classList.add("visible");
  clearTimeout(showAchToast._t);
  showAchToast._t = setTimeout(() => toast.classList.remove("visible"), 4500);
}

// ─── Keyboard handler ───────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (mode !== "practice" || !practiceActive || revealedInPractice) return;
  if (confirming) return;
  const active = document.activeElement;
  if (active && active.id !== "hidden-input" && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) return;

  if (e.key === "Backspace") { e.preventDefault(); deleteLast(); return; }
  if (!/^[0-9]$/.test(e.key)) return;
  e.preventDefault();

  const rangeLen = rangeTo - rangeFrom + 1;
  if (typed.length >= rangeLen) return;

  const expectedDigit = PI_DIGITS[rangeFrom - 1 + typed.length];
  const pressed = e.key;
  typed += pressed;

  const fb = document.getElementById("feedback");
  const currentPos = rangeFrom + typed.length - 1;

  // Compute prefix-correctness once: did everything from rangeFrom up to here go right?
  let prefixCorrect = true;
  for (let i = 0; i < typed.length; i++) {
    if (typed[i] !== PI_DIGITS[rangeFrom - 1 + i]) { prefixCorrect = false; break; }
  }

  if (pressed !== expectedDigit) {
    fb.textContent = t("digitWrong")(currentPos, pressed, expectedDigit);
    fb.className = "feedback bad";
    state.streak = 0;
    saveState();
  } else {
    fb.textContent = t("digitOk")(currentPos);
    fb.className = "feedback ok";

    // Award achievements per-digit as soon as you correctly reach the threshold position.
    if (prefixCorrect) {
      const awarded = awardIfThreshold(currentPos);
      // Update maxKnown incrementally — your "best memorized" reflects real-time progress.
      const prevMax = state.maxKnown;
      if (currentPos > prevMax) state.maxKnown = currentPos;
      if (awarded || state.maxKnown > prevMax) {
        saveState();
        renderAchievements();
      }
    }
  }

  if (currentPos % 10 === 0 && !celebratedMilestones.has(currentPos)) {
    celebratedMilestones.add(currentPos);
    if (prefixCorrect) showBanner(t("milestoneOk")(currentPos), true);
    else showBanner(t("milestoneBad")(currentPos), false);
  }

  if (typed.length === rangeLen) {
    if (prefixCorrect) {
      state.streak++;
      if (state.streak > state.best) state.best = state.streak;
      state.todayCount += rangeLen;
      saveState();
      fb.textContent = t("allCorrect")(rangeFrom, rangeTo, state.streak);
      fb.className = "feedback ok";
      showBanner(t("allCorrectBanner")(rangeLen), true);
    } else {
      fb.textContent = t("doneWithErrors");
      fb.className = "feedback bad";
    }
  }

  render();
});

document.getElementById("typing-area").addEventListener("click", focusInput);

// ─── Init ───────────────────────────────────────────────────
applyLang();
setMode("learn");
render();
renderAchievements();
</script>
